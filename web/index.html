<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Jarvis — Voice Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- jarvis-client.js exposes window.JarvisClient (real WebSocket + mic + barge-in
       close+recreate). Loaded as a classic script BEFORE the JSX modules so the
       global is in scope by the time React mounts. -->
  <script src="jarvis-client.js"></script>

  <!-- Design bundle (verbatim from design/claude-design/), transformed in-browser
       by Babel-standalone. The order matters: tweaks-panel first (exports the
       TweaksPanel + useTweaks hook), then ios-frame, then components, then main.
       main.jsx is the REAL wiring (not the design's mock) — it consumes
       window.JarvisClient and renders the design components. -->
  <script type="text/babel" data-presets="env,react" src="tweaks-panel.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="ios-frame.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="components.jsx"></script>
  <!-- BUG-DIAG-2026-06-01: mic + Whisper diagnostic modal. Loaded
       BEFORE main.jsx so window.JarvisMicTestModal is in scope when
       main.jsx renders. Delete this <script> tag when the modal is
       removed (grep BUG-DIAG-2026-06-01). -->
  <script type="text/babel" data-presets="env,react" src="mic-test-modal.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="main.jsx"></script>
</body>
</html>
